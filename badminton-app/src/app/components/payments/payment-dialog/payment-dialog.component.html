<div class="modal-header">
    <div class="modal-title-wrap">
        <div class="modal-icon">💳</div>
        <div>
            <h3>{{ editMode ? 'Edit Payment' : 'Record New Payment' }}</h3>
            <p class="modal-subtitle">{{ editMode ? 'Update payment details' : 'Add a payment transaction to the system'
                }}</p>
        </div>
    </div>
    <button class="close-btn" (click)="onCancel()">✕</button>
</div>

<div class="modal-body">
    <!-- Amount Hero -->
    <div class="amount-hero">
        <div class="amount-hero-label">AMOUNT</div>
        <div class="amount-input-wrap">
            <span class="currency-symbol">₹</span>
            <input type="number" class="amount-input" [(ngModel)]="payment.amount" placeholder="0.00" min="0"
                step="0.01">
        </div>
        <div class="amount-hint">Enter the payment amount in Indian Rupees</div>
    </div>

    <div class="form-section-title">Payment Details</div>
    <div class="grid-2">
        <div class="form-group">
            <label>Player *</label>
            <select [(ngModel)]="payment.player">
                <option value="">Select Player</option>
                <option *ngFor="let p of playerNames" [value]="p">{{ p }}</option>
            </select>
        </div>
        <div class="form-group">
            <label>Payment Type *</label>
            <select [(ngModel)]="payment.type">
                <option value="">Select Type</option>
                <option value="Monthly Fee">Monthly Fee</option>
                <option value="Session Fee">Session Fee</option>
                <option value="Tournament Fee">Tournament Fee</option>
                <option value="Registration Fee">Registration Fee</option>
                <option value="Equipment">Equipment</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="form-group">
            <label>Payment Method</label>
            <select [(ngModel)]="payment.method">
                <option value="UPI">📱 UPI</option>
                <option value="Card">💳 Card</option>
                <option value="Cash">💵 Cash</option>
                <option value="Bank Transfer">🏦 Bank Transfer</option>
                <option value="Cheque">📄 Cheque</option>
            </select>
        </div>
        <div class="form-group">
            <label>Payment Date</label>
            <input type="date" [(ngModel)]="payment.date">
        </div>
    </div>

    <div class="form-section-title">Status</div>
    <div class="status-pills">
        <button type="button" class="status-pill paid" [class.active]="payment.status === 'Paid'"
            (click)="payment.status = 'Paid'">
            <span class="pill-dot"></span>
            <span class="pill-icon">✅</span>
            <span class="pill-label">Paid</span>
            <span class="pill-check" *ngIf="payment.status === 'Paid'">✓</span>
        </button>
        <button type="button" class="status-pill pending" [class.active]="payment.status === 'Pending'"
            (click)="payment.status = 'Pending'">
            <span class="pill-dot"></span>
            <span class="pill-icon">⏳</span>
            <span class="pill-label">Pending</span>
            <span class="pill-check" *ngIf="payment.status === 'Pending'">✓</span>
        </button>
        <button type="button" class="status-pill overdue" [class.active]="payment.status === 'Overdue'"
            (click)="payment.status = 'Overdue'">
            <span class="pill-dot"></span>
            <span class="pill-icon">🚨</span>
            <span class="pill-label">Overdue</span>
            <span class="pill-check" *ngIf="payment.status === 'Overdue'">✓</span>
        </button>
    </div>

    <div class="form-group" style="margin-top:14px">
        <label>Reference / Notes</label>
        <input type="text" [(ngModel)]="payment.reference" placeholder="e.g. TXN001234 or any note">
    </div>

    <div class="form-error" *ngIf="formError">⚠️ {{ formError }}</div>
</div>

<div class="modal-footer">
    <button class="btn btn-outline" (click)="onCancel()">Cancel</button>
    <button class="btn btn-primary" (click)="onSave()">
        {{ editMode ? '💾 Save Changes' : '✅ Record Payment' }}
    </button>
</div>
