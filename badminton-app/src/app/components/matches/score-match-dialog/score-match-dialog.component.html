<div class="modal-header">
    <div class="modal-title-wrap">
        <div class="modal-icon">🎯</div>
        <div>
            <h3>Enter Match Score</h3>
            <p class="modal-subtitle">{{ match.player1 }} vs {{ match.player2 }}</p>
        </div>
    </div>
    <button class="close-btn" (click)="onCancel()">✕</button>
</div>

<div class="modal-body">
    <div class="score-entry">
        <div class="score-player">
            <p class="score-player-name">{{ match.player1 }}</p>
            <input type="number" class="score-input" [(ngModel)]="match.score1" min="0" max="30">
        </div>
        <div class="score-divider">—</div>
        <div class="score-player">
            <p class="score-player-name">{{ match.player2 }}</p>
            <input type="number" class="score-input" [(ngModel)]="match.score2" min="0" max="30">
        </div>
    </div>

    <div class="form-group" style="margin-top:16px">
        <label>Duration</label>
        <input type="text" [(ngModel)]="match.duration" placeholder="e.g. 45 min">
    </div>
    <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="match.status">
            <option value="Live">Live</option>
            <option value="Completed">Completed</option>
        </select>
    </div>
</div>

<div class="modal-footer">
    <button class="btn btn-outline" (click)="onCancel()">Cancel</button>
    <button class="btn btn-primary" (click)="onSave()">💾 Save Score</button>
</div>
